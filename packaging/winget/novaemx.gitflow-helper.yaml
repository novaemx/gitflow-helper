# yaml-language-server: $schema=https://aka.ms/winget-manifest.defaultLocale.1.6.0.schema.json
PackageIdentifier: novaemx.gitflow-helper
PackageVersion: 0.5.38
PackageLocale: en-US
Publisher: Luis Lozano
PublisherUrl: https://github.com/novaemx
PackageName: Gitflow Helper
PackageUrl: https://github.com/novaemx/gitflow-helper
License: MIT
LicenseUrl: https://github.com/novaemx/gitflow-helper/blob/main/LICENSE
ShortDescription: Git Flow workflow helper with interactive TUI and CLI
Description: >-
  A comprehensive Git Flow workflow helper with an interactive full-screen TUI
  and CLI subcommands. Only requires git — no git-flow extensions needed.
  Detects IDE environment (Cursor, VS Code, Claude Code, Windsurf, Zed, etc.)
  and auto-initializes gitflow branch structure.
Tags:
  - git
  - gitflow
  - cli
  - tui
  - devtools
  - workflow
Installers:
  - Architecture: x64
    InstallerType: zip
    InstallerUrl: https://github.com/novaemx/gitflow-helper/releases/download/v0.5.38/gitflow-0.5.38-windows-amd64.zip
    InstallerSha256: c589f6efdb961d831928ca8ef96b6f58c1fdd8b95003f0657f2c95f673269e8a
    NestedInstallerType: portable
    NestedInstallerFiles:
      - RelativeFilePath: gitflow.exe
        PortableCommandAlias: gitflow
ManifestType: singleton
ManifestVersion: 1.6.0
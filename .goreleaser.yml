version: 2

project_name: gitflow

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - id: linux-amd64
    main: ./cmd/gitflow
    binary: gitflow
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}}

  - id: linux-arm64
    main: ./cmd/gitflow
    binary: gitflow
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}}

  - id: windows-amd64
    main: ./cmd/gitflow
    binary: gitflow
    env:
      - CGO_ENABLED=0
    goos:
      - windows
    goarch:
      - amd64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}}

  - id: darwin-amd64
    main: ./cmd/gitflow
    binary: gitflow
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}}

  - id: darwin-arm64
    main: ./cmd/gitflow
    binary: gitflow
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}}

universal_binaries:
  - id: darwin-universal
    ids:
      - darwin-amd64
      - darwin-arm64
    name_template: gitflow
    replace: true

archives:
  - id: linux
    ids:
      - linux-amd64
    name_template: "{{ .ProjectName }}-{{ .Version }}-linux-amd64"
    formats:
      - tar.gz

  - id: linux-aarch64
    ids:
      - linux-arm64
    name_template: "{{ .ProjectName }}-{{ .Version }}-linux-aarch64"
    formats:
      - tar.gz

  - id: windows
    ids:
      - windows-amd64
    name_template: "{{ .ProjectName }}-{{ .Version }}-windows-amd64"
    formats:
      - zip

  - id: darwin
    ids:
      - darwin-universal
    name_template: "{{ .ProjectName }}-{{ .Version }}-darwin-universal"
    formats:
      - tar.gz

checksum:
  name_template: "checksums.txt"

nfpms:
  - id: linux-packages
    package_name: gitflow-helper
    vendor: novaemx
    homepage: https://github.com/novaemx/gitflow-helper
    maintainer: Luis Lozano
    description: Git Flow workflow helper with interactive TUI and CLI.
    license: MIT
    formats:
      - deb
      - rpm
      - archlinux
    ids:
      - linux-amd64
      - linux-arm64
    bindir: /usr/bin
    contents:
      - src: ./LICENSE
        dst: /usr/share/licenses/gitflow-helper/LICENSE

snapshot:
  version_template: "{{ .Version }}-SNAPSHOT-{{ if eq .ShortCommit \"none\" }}dev{{ else }}{{ .ShortCommit }}{{ end }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: novaemx
    name: gitflow-helper
  draft: false
  prerelease: auto

homebrew_casks:
  - name: gitflow-helper
    ids:
      - darwin
    binaries:
      - gitflow
    repository:
      owner: novaemx
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/novaemx/gitflow-helper"
    description: "Git Flow workflow helper — interactive TUI + CLI. Only requires git."
    license: "MIT"
    # Upload only when token exists; otherwise keep local generation behavior.
    skip_upload: "{{ if .Env.HOMEBREW_TAP_GITHUB_TOKEN }}false{{ else }}true{{ end }}"
